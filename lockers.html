<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lockers</title>
  <link rel="stylesheet" href="styleniya.css">
</head>
<body>
  <h2>Locker Grid</h2>
  <div id="lockerGrid" class="grid"></div>

  <script>
    // Fetch locker data from PHP backend
    fetch("lockers.php?dept=CEIT&floor=1")
      .then(response => response.json())
      .then(data => {
        const grid = document.getElementById("lockerGrid");
        grid.innerHTML = "";
        data.forEach(locker => {
          const div = document.createElement("div");
          div.className = `locker ${locker.status}`;
          div.textContent = `Locker ${locker.id}`;
          grid.appendChild(div);
        });
      });
  </script>
</body>
</html>
